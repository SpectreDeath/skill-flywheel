version: '3.8'
networks:
  mcp-network:
    driver: bridge

services:
  discovery-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    environment:
      - PYTHONPATH=/app
    command: uvicorn src.server.discovery_service:app --host 0.0.0.0 --port 8000
    networks:
      - mcp-network
