version: "3.8"

services:
  discovery:
    build: 
      context: .
      dockerfile: deploy/container/Dockerfile
    command: python src/discovery/discovery_service.py
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MCP_TRANSPORT=http
    volumes:
      - ./skill_registry.json:/app/skill_registry.json:ro
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcp-orchestration:
    build:
      context: .
      dockerfile: deploy/container/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - MCP_SERVER_NAME=OrchestrationServer
      - MCP_DOMAINS=orchestration,skill_registry,META_SKILL_DISCOVERY,meta_agent_enhancement,FLOW,TEMPLATES,agent_evolution
    volumes:
      - ./domains:/app/domains:ro
      - ./skill_registry.json:/app/skill_registry.json:ro
      - ./telemetry:/app/telemetry:rw
    networks:
      - mcp-network

  mcp-security:
    build:
      context: .
      dockerfile: deploy/container/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - MCP_SERVER_NAME=SecurityServer
      - MCP_DOMAINS=APPLICATION_SECURITY,security_engineering,skill_validation,DEVSECOPS,forensics,osint_collector
    volumes:
      - ./domains:/app/domains:ro
      - ./skill_registry.json:/app/skill_registry.json:ro
      - ./telemetry:/app/telemetry:rw
    networks:
      - mcp-network

  mcp-data-ai:
    build:
      context: .
      dockerfile: deploy/container/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - MCP_SERVER_NAME=DataAIServer
      - MCP_DOMAINS=ML_AI,DATA_ENGINEERING,probabilistic_models,epistemology,AI_ETHICS
    volumes:
      - ./domains:/app/domains:ro
      - ./skill_registry.json:/app/skill_registry.json:ro
      - ./telemetry:/app/telemetry:rw
    networks:
      - mcp-network

  mcp-devops:
    build:
      context: .
      dockerfile: deploy/container/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - MCP_SERVER_NAME=DevOpsServer
      - MCP_DOMAINS=DEVOPS,CLOUD_ENGINEERING,DATABASE_ENGINEERING,MODERN_BACKEND_DEVELOPMENT,mcp_tools,EDGE_COMPUTING
    volumes:
      - ./domains:/app/domains:ro
      - ./skill_registry.json:/app/skill_registry.json:ro
      - ./telemetry:/app/telemetry:rw
    networks:
      - mcp-network

  mcp-engineering:
    build:
      context: .
      dockerfile: deploy/container/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
      - MCP_SERVER_NAME=EngineeringServer
      - MCP_DOMAINS=SPECIFICATION_ENGINEERING,formal_methods
    volumes:
      - ./domains:/app/domains:ro
      - ./skill_registry.json:/app/skill_registry.json:ro
      - ./telemetry:/app/telemetry:rw
    networks:
      - mcp-network

  mcp-ux-mobile:
    build:
      context: .
      dockerfile: deploy/container/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - PORT=8006
      - MCP_SERVER_NAME=UXMobileServer
      - MCP_DOMAINS=FRONTEND,mobile_development
    volumes:
      - ./domains:/app/domains:ro
      - ./skill_registry.json:/app/skill_registry.json:ro
      - ./telemetry:/app/telemetry:rw
    networks:
      - mcp-network

  mcp-advanced:
    build:
      context: .
      dockerfile: deploy/container/Dockerfile
    ports:
      - "8007:8007"
    environment:
      - PORT=8007
      - MCP_SERVER_NAME=AdvancedServer
      - MCP_DOMAINS=QUANTUM_COMPUTING,WEB3,ALGO_PATTERNS,search_algorithms,logic,logic_programming
    volumes:
      - ./domains:/app/domains:ro
      - ./skill_registry.json:/app/skill_registry.json:ro
      - ./telemetry:/app/telemetry:rw
    networks:
      - mcp-network

  mcp-strategy:
    build:
      context: .
      dockerfile: deploy/container/Dockerfile
    ports:
      - "8008:8008"
    environment:
      - PORT=8008
      - MCP_SERVER_NAME=StrategyServer
      - MCP_DOMAINS=strategy_analysis,epidemiology,game_theory,GAME_DEV
    volumes:
      - ./domains:/app/domains:ro
      - ./skill_registry.json:/app/skill_registry.json:ro
      - ./telemetry:/app/telemetry:rw
    networks:
      - mcp-network

  mcp-agent-rd:
    build:
      context: .
      dockerfile: deploy/container/Dockerfile
    ports:
      - "8009:8009"
    environment:
      - PORT=8009
      - MCP_SERVER_NAME=AgentRDServer
      - MCP_DOMAINS=AI_AGENT_DEVELOPMENT,generated_skills
    volumes:
      - ./domains:/app/domains:ro
      - ./skill_registry.json:/app/skill_registry.json:ro
      - ./telemetry:/app/telemetry:rw
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
