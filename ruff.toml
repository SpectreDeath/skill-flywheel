[lint]
# Enable rule groups
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "TID", "ARG", "PLE", "PLR", "PLW"]
ignore = [
    "E501",  # Line too long (handled by formatter)
    "B008",  # Do not perform function calls in argument defaults
    "ARG001",  # Unused argument
    "ARG002",  # Unused method argument
    "ARG003",  # Unused class method argument
    "ARG005",  # Unused lambda argument
    "PLR0913",  # Too many arguments
    "W291",  # Trailing whitespace (handled by formatter)
    "B904",  # Within except clause, raise exceptions with 'from' - stylistic choice
    "E722",  # Do not use bare 'except'
    "PLR2004",  # Magic value used in comparison
    "PLR0915",  # Too many statements
    "PLR0912",  # Too many branches
    "PLR0911",  # Too many return statements
    "UP006",  # Use dict/list instead of Dict/List
    "UP007",  # Use X | Y instead of Optional[X]
    "UP035",  # Deprecated typing imports (backwards compat)
    "UP045",  # Use X | None instead of Optional[X] (backwards compat)
    "W293",  # Blank line contains whitespace
    "N806",  # Variable in function should be lowercase (style)
    "N803",  # Argument should be lowercase (style)
    "B028",  # No explicit stacklevel (style)
    "SIM105",  # Use contextlib.suppress (style)
    "SIM102",  # Nested if statements (style)
    "SIM116",  # Dictionary instead of ifs (style)
    "F841",  # Local variable assigned but never used
    "C401",  # Unnecessary generator
    "B007",  # Loop control variable not used
    "E402",  # Module level import not at top
    "I001",  # Import block unsorted
    "PLW0603",  # Using global statement
    "PLW0602",  # Using global but no assignment
    "PLW2901",  # Loop variable overwritten
    "PLR1704",  # Redefining argument
    "PLW1510",  # subprocess.run without check
    "PLW1508",  # Env var type
    "N999",  # Invalid module name
    "E741",  # Ambiguous variable name
    "F401",  # Unused imports (in skills)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["F401", "B011", "E712", "SIM117", "PLR1722"]
# Generated skill files with F821 undefined names (need manual fix)
"src/skills/ML_AI/a_coding_guide_to_acp_systems.py" = ["F821"]
"src/skills/agentic_ai/self_improvement_engine.py" = ["F821"]
"src/skills/application_security/robust_llm_safety_filters.py" = ["F821"]
"src/skills/cognitive_skills/accuracy_and_speed.py" = ["F821"]
"src/skills/logic/sat_solver_optimization.py" = ["F821"]
"src/skills/mobile_development/mobile_development.py" = ["F821"]
"src/skills/modern_backend/microservices_orchestrator.py" = ["F821"]
"src/skills/search_algorithms/search_algorithms.py" = ["F821"]
"src/skills/skill_validation.py" = ["F402"]
"src/skills/SECURITY/*.py" = ["B005", "PLE1310"]
"src/skills/devops/__init__.py" = ["F811"]
"src/skills/openclaw_database_manager.py" = ["SIM117"]

[format]
# Use ruff's formatter
quote-style = "double"
indent-style = "space"
line-ending = "auto"
