name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff==0.15.7
      - name: Run Ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Create virtual environment and install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip setuptools
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest pytest-cov safety
          .venv/bin/pip install --upgrade pip
      - name: Run safety check
        run: |
          .venv/bin/pip install safety
          .venv/bin/safety check --json || true
      - name: Run tests with coverage
        run: |
          .venv/bin/pytest tests/ --cov=src --cov-report=term-missing --cov-report=json --cov-report-xml=coverage.xml --cov-fail-under=0 -W ignore -W ignore::DeprecationWarning -W ignore::pytest.PytestReturnNotNoneWarning --tb=short -v
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
