# FLOW: Code Quality Audit Pipeline
#
# Comprehensive code quality assessment workflow.
# Orchestrates multiple skills to evaluate and improve codebase quality.

name: "Code Quality Audit"
description: "Comprehensive code quality assessment and improvement workflow"
version: "1.0.0"
author: "Agent Skills Library"

# Pipeline Configuration
pipeline:
  - name: "Repository Reconnaissance"
    skill: "SKILL.repo_recon.md"
    inputs:
      repository_path: "${REPO_PATH}"
      focus_areas: ["structure", "code_quality", "architecture"]
    outputs:
      - "repo_analysis_report.json"
      - "quality_baseline.md"
    timeout: 300
    retry_attempts: 2

  - name: "Test Coverage Survey"
    skill: "SKILL.test_survey.md"
    inputs:
      repository_path: "${REPO_PATH}"
      coverage_threshold: "80%"
      focus_areas: "all_test_types"
    outputs:
      - "test_coverage_report.json"
      - "test_quality_report.md"
    timeout: 400
    retry_attempts: 2
    depends_on: ["Repository Reconnaissance"]

  - name: "Performance Audit"
    skill: "SKILL.perf_audit.md"
    inputs:
      repository_path: "${REPO_PATH}"
      target_performance_metrics: "application_specific"
      areas_of_concern: ["code_patterns", "algorithms", "data_structures"]
    outputs:
      - "performance_audit_report.json"
      - "performance_optimization_guide.md"
    timeout: 600
    retry_attempts: 1
    depends_on: ["Repository Reconnaissance"]

  - name: "API Design Review"
    skill: "SKILL.api_design.md"
    inputs:
      api_specifications: "auto-discover"
      target_audience: "developers"
      performance_requirements: "high_performance"
    outputs:
      - "api_design_report.json"
      - "api_improvement_plan.md"
    timeout: 300
    retry_attempts: 1
    depends_on: ["Repository Reconnaissance"]

  - name: "Refactoring Strategy Development"
    skill: "SKILL.refactor_plan.md"
    inputs:
      repository_path: "${REPO_PATH}"
      refactoring_goals: ["maintainability", "performance", "testability"]
      risk_tolerance: "moderate"
      constraints: "maintain_functionality"
    outputs:
      - "refactoring_plan.json"
      - "refactoring_roadmap.md"
    timeout: 500
    retry_attempts: 1
    depends_on: ["Repository Reconnaissance", "Test Coverage Survey", "Performance Audit"]

  - name: "Generate Quality Improvement Plan"
    skill: "SKILL.skill_drafting.md"
    inputs:
      natural_language_description: "Create a comprehensive code quality improvement plan based on all audit findings"
      environment_constraints: "Include prioritized recommendations from test_survey, perf_audit, api_design, and refactor_plan"
      examples: "Focus on high-impact improvements with clear implementation steps"
    outputs:
      - "quality_improvement_plan.md"
      - "implementation_checklist.md"
    timeout: 300
    retry_attempts: 1
    depends_on: ["Repository Reconnaissance", "Test Coverage Survey", "Performance Audit", "API Design Review", "Refactoring Strategy Development"]

# Pipeline Settings
settings:
  parallel_execution: true
  fail_fast: false
  continue_on_partial_failure: true
  output_format: "markdown"
  report_level: "comprehensive"

# Success Criteria
success_criteria:
  - "All quality assessment skills complete successfully"
  - "Test coverage meets or exceeds target threshold"
  - "Performance bottlenecks are identified and documented"
  - "API design follows best practices"
  - "Refactoring plan provides actionable improvement steps"
  - "Quality improvement plan prioritizes high-impact changes"

# Error Handling
error_handling:
  timeout_policy: "continue_with_partial"
  failure_policy: "continue_with_warnings"
  rollback_strategy: "none"
  notification_level: "on_critical_failure"

# Output Artifacts
artifacts:
  primary_report: "quality_improvement_plan.md"
  detailed_reports:
    - "quality_baseline.md"
    - "test_quality_report.md"
    - "performance_optimization_guide.md"
    - "api_improvement_plan.md"
    - "refactoring_roadmap.md"
  implementation_guides:
    - "implementation_checklist.md"
  data_exports:
    - "repo_analysis_report.json"
    - "test_coverage_report.json"
    - "performance_audit_report.json"
    - "api_design_report.json"
    - "refactoring_plan.json"

# Quality Metrics
quality_metrics:
  test_coverage: "minimum_80_percent"
  code_complexity: "cyclomatic_complexity_under_10"
  performance: "response_time_under_200ms"
  api_design: "restful_principles_compliance"
  maintainability: "technical_debt_under_acceptable_threshold"

# Usage Instructions
usage:
  - "Set REPO_PATH environment variable to your project directory"
  - "Run: agent run FLOW.quality_audit.yaml"
  - "Review quality baseline and identify priority areas"
  - "Follow implementation checklist for systematic improvements"
  - "Re-run audit after implementing changes to measure progress"

# Prerequisites
prerequisites:
  - "Access to complete repository codebase"
  - "Test runner and coverage tools configured"
  - "Performance profiling tools available"
  - "API documentation or specifications accessible"
  - "Development environment properly set up"

# Estimated Runtime
estimated_runtime: "20-40 minutes depending on project size and complexity"

# Follow-up Actions
follow_up_actions:
  - "Implement high-priority improvements from implementation_checklist.md"
  - "Set up automated quality gates in CI/CD pipeline"
  - "Schedule regular quality audits (monthly/quarterly)"
  - "Track progress using quality metrics dashboard"
  - "Train team on identified best practices and patterns"