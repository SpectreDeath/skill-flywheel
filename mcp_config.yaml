# Skill Flywheel Configuration
# Copy this file and customize for your environment

server:
  host: "0.0.0.0"
  port: 8000
  debug: false
  
  # PRODUCTION: Replace with your production domains
  # cors_origins:
  #   - "https://your-domain.com"
  #   - "https://www.your-domain.com"
  # DEVELOPMENT: Default localhost origins (safe for dev)
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:8080"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:5173"
    - "http://127.0.0.1:8080"
  
  max_concurrent_requests: 100
  request_timeout: 300
  workers: 4
  worker_class: "uvicorn.workers.UvicornWorker"

# SECURITY: Enable for production
security:
  api_key_required: true
  rate_limit: 100
  
  # PRODUCTION: Use strong JWT secret
  # jwt_secret: "${MCP_JWT_SECRET}"

# Cache configuration
cache:
  type: redis
  redis_url: "redis://localhost:6379/0"
  ttl: 3600
  max_size: 1000
  compression: true

# Celery for async tasks
celery:
  broker_url: "redis://localhost:6379/1"
  result_backend: "redis://localhost:6379/2"
